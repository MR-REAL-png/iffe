<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IFFE — Transaksi</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/transaksi.css" />
</head>
<body>
  <div class="app-content">
    <h1 class="page-title">Transaksi</h1>

    <div class="filter-bar">
      <select id="filterUser">
        <option value="">Semua Anggota</option>
      </select>
      <select id="filterKategori">
        <option value="">Semua Kategori</option>
      </select>
      <input type="month" id="filterBulan" />
    </div>

    <div id="transactionList" class="transaction-list">
      <p class="text-secondary empty-state">Belum ada transaksi.</p>
    </div>
  </div>

  <button id="fabAdd" class="fab" aria-label="Tambah transaksi">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
    </svg>
  </button>

  <nav id="bottomNav" class="bottom-nav"></nav>

  <!-- Modal Tambah Transaksi -->
  <div id="transaksiModal" class="modal-overlay" hidden>
    <div class="modal-sheet">
      <h3 class="modal-title">Tambah Transaksi</h3>

      <div class="segmented" id="jenisToggle">
        <button type="button" data-jenis="pengeluaran" class="active">Pengeluaran</button>
        <button type="button" data-jenis="pemasukan">Pemasukan</button>
      </div>

      <form id="transaksiForm">
        <div class="field">
          <label for="inputTanggal">Tanggal</label>
          <input type="date" id="inputTanggal" required />
        </div>

        <div class="field">
          <label for="inputKategori">Kategori</label>
          <select id="inputKategori" required></select>
        </div>

        <div class="field">
          <label for="inputBank">Bank</label>
          <select id="inputBank" required></select>
        </div>

        <div class="field">
          <label for="inputMetode">Metode</label>
          <select id="inputMetode" required></select>
        </div>

        <div class="field">
          <label for="inputNominal">Nominal</label>
          <input type="text" id="inputNominal" inputmode="numeric" placeholder="0" required />
        </div>

        <div class="field">
          <label for="inputDeskripsi">Deskripsi (opsional)</label>
          <textarea id="inputDeskripsi" rows="2"></textarea>
        </div>

        <div class="field">
          <label for="inputStruk">Scan Struk AI (opsional)</label>
          <input type="file" id="inputStruk" accept="image/*" />
        </div>

        <div class="modal-actions">
          <button type="button" id="cancelBtn" class="btn-secondary">Batal</button>
          <button type="submit" class="btn-primary">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/transaksi.js"></script>
</body>
</html>
