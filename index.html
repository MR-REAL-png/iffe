<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IFFE — Login</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/index.css" />
</head>
<body>
  <div class="login-screen">
    <img src="assets/logo.png" alt="IFFE" class="login-logo" />
    <h1 class="login-title">IFFE</h1>
    <p class="login-subtitle text-secondary">Pilih nama untuk masuk</p>

    <div id="userList" class="login-user-list">
      <!-- diisi dinamis lewat auth.js -->
    </div>

    <p id="loginError" class="login-error" hidden>
      Gagal memuat data, coba lagi.
    </p>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
