<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IFFE — Tabungan</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/tabungan.css" />
</head>
<body>
  <div class="app-content">
    <h1 class="page-title">Tabungan</h1>

    <div id="tabunganList" class="tabungan-list">
      <!-- diisi dinamis oleh tabungan.js -->
    </div>
  </div>

  <button id="fabAdd" class="fab" aria-label="Sisihkan ke tabungan">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
    </svg>
  </button>

  <nav id="bottomNav" class="bottom-nav"></nav>

  <!-- Modal Sisihkan Tabungan -->
  <div id="tabunganModal" class="modal-overlay" hidden>
    <div class="modal-sheet">
      <h3 class="modal-title">Sisihkan ke Tabungan</h3>

      <form id="tabunganForm">
        <div class="field">
          <label for="pilihTabungan">Tabungan</label>
          <select id="pilihTabungan" required>
            <option value="new">+ Tabungan Baru</option>
          </select>
        </div>

        <div id="newTabunganFields">
          <div class="field">
            <label for="namaTabungan">Nama Tabungan</label>
            <input type="text" id="namaTabungan" placeholder="Misal: Liburan Bali" />
          </div>
          <div class="field">
            <label for="tujuanTabungan">Tujuan (opsional)</label>
            <input type="text" id="tujuanTabungan" />
          </div>
        </div>

        <div class="field">
          <label for="nominalTabungan">Nominal Disisihkan</label>
          <input type="text" id="nominalTabungan" inputmode="numeric" placeholder="0" required />
        </div>

        <div class="field">
          <label for="dariBankTabungan">Ambil dari Bank</label>
          <select id="dariBankTabungan" required></select>
        </div>

        <div class="modal-actions">
          <button type="button" id="cancelTabungan" class="btn-secondary">Batal</button>
          <button type="submit" class="btn-primary">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/tabungan.js"></script>
</body>
</html>
